  <title>TomTom Route Converter</title>

  <script>
    // MANIFEST PWA: SteelBlue e Icona Bussola su Bianco
    const __manifest = {
      name: "TomTom Route Converter",
      short_name: "TomTom GPX",
      start_url: "./",
      display: "standalone",
      background_color: "#4682B4",
      theme_color: "#4682B4",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%234682B4'/%3E%3Crect x='80' y='80' width='352' height='352' rx='80' fill='%23ffffff'/%3E%3Ccircle cx='256' cy='256' r='120' fill='none' stroke='%23F59E0B' stroke-width='8'/%3E%3Cpolygon points='256,160 275,240 256,256 237,240' fill='%23EF4444'/%3E%3Cpolygon points='256,352 237,272 256,256 275,272' fill='%2310B981'/%3E%3Ccircle cx='256' cy='256' r='15' fill='%23475569'/%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }]
    };
    const __blob = new Blob([JSON.stringify(__manifest)], {type:'application/manifest+json'});
    const __link = document.createElement('link');
    __link.rel = 'manifest';
    __link.href = URL.createObjectURL(__blob);
    document.head.appendChild(__link);
  </script>
  
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%234682B4'/%3E%3Crect x='80' y='80' width='352' height='352' rx='80' fill='%23ffffff'/%3E%3Ccircle cx='256' cy='256' r='120' fill='none' stroke='%23F59E0B' stroke-width='8'/%3E%3Cpolygon points='256,160 275,240 256,256 237,240' fill='%23EF4444'/%3E%3Cpolygon points='256,352 237,272 256,256 275,272' fill='%2310B981'/%3E%3Ccircle cx='256' cy='256' r='15' fill='%23475569'/%3E%3C/svg%3E"/>
  
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #4682B4; /* SteelBlue */
      --bg2: #3b6e99;
      --bg3: #2e5677;
      --text: #FFFFFF;
      --radius: 14px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; margin: 0; padding: 0;
    }

    .header {
      padding: 20px; background: rgba(70, 130, 180, 0.95);
      backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      display: flex; align-items: center; gap: 12px;
    }
    .logo { width: 42px; height: 42px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

    main { max-width: 600px; margin: 0 auto; padding: 20px; }

    /* BANNER INSTALLAZIONE */
    #installBanner {
      display: none; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.15); border: 1.5px solid #fff;
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
    }
    #installBanner.show { display: flex; }
    
    #installBtn {
      background: #fff; color: var(--bg); border: none; border-radius: 8px;
      padding: 10px 16px; font-family: 'Syne', sans-serif; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }

    .card { background: var(--bg2); border-radius: 20px; padding: 20px; }
    input {
      width: 100%; background: var(--bg3); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; padding: 12px; color: #fff; margin: 10px 0; outline: none;
    }
    .btn-main {
      width: 100%; background: #fff; color: var(--bg); border: none;
      border-radius: 12px; padding: 15px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer;
    }

    /* Spinner per il tasto installa */
    .loading { opacity: 0.7; pointer-events: none; position: relative; }
    .loading::after { content: "..."; margin-left: 5px; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">🧭</div>
  <div>
    <div style="font-family:'Syne'; font-weight:700;">TomTom Route Converter</div>
    <div style="font-size:10px; opacity:0.8;">GPX GENERATOR</div>
  </div>
</header>

<main>
  <div id="installBanner">
    <div style="font-size:24px;">📲</div>
    <div style="flex:1; font-size:13px;">
      <b>Installa l'App</b><br>Usala a tutto schermo come un'app nativa.
    </div>
    <button id="installBtn">Installa</button>
  </div>

  <div class="card">
    <label style="font-size:11px; opacity:0.8;">URL GOOGLE MAPS</label>
    <input type="url" id="urlIn" placeholder="Incolla qui l'URL...">
    <button class="btn-main" onclick="alert('Funzione conversione attiva!')">Converti</button>
  </div>
</main>

<script>
let _prompt = null;
const banner = document.getElementById('installBanner');
const btn = document.getElementById('installBtn');

// 1. Mostra il banner subito se non è già installata
if (!window.matchMedia('(display-mode: standalone)').matches && !window.navigator.standalone) {
  banner.classList.add('show');
}

// 2. Cattura l'evento di installazione di Android
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _prompt = e;
  // Se l'utente aveva già cliccato "Installa" mentre caricava, avviamo ora
  if (btn.classList.contains('waiting')) {
    triggerInstall();
  }
});

btn.onclick = () => {
  if (_prompt) {
    triggerInstall();
  } else if (!/iPhone|iPad|iPod/.test(navigator.userAgent)) {
    // Se Android non è ancora pronto, mettiamo il tasto in attesa invece di dare errore
    btn.classList.add('loading', 'waiting');
    btn.innerText = "Preparazione";
  } else {
    // Per iOS mostriamo le istruzioni manuali
    alert("Su iPhone: tocca l'icona 'Condividi' in basso e seleziona 'Aggiungi alla schermata Home'.");
  }
};

async function triggerInstall() {
  btn.classList.remove('loading', 'waiting');
  btn.innerText = "Installa";
  _prompt.prompt();
  const { outcome } = await _prompt.userChoice;
  if (outcome === 'accepted') banner.classList.remove('show');
  _prompt = null;
}

// 3. Service Worker necessario per PWA
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>

</body>
</html>
